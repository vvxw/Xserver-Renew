name: XServer Renew

on:
  schedule:
    - cron: '0 1 */2 * *'  # Runs every 24 hours at 01:00 UTC
  workflow_dispatch: 

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: ⚙ 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: 🛠️ 安装依赖
      run: npm install
           npx playwright install --with-deps chrome

    - name: ⚙ 设置代理 (sing-box)
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: 🚀 运行续期脚本
      env:
        ACCOUNTS: ${{ secrets.ACCOUNTS }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      run: npm start || true

    - name: 🧽 清理进程和临时文件
      if: always()
      run: |
        pkill -f sing-box || true
        pkill -f chromedriver || true
        pkill -f chrome || true
        pkill -f Xvfb || true
        rm -f sing-box sing-box-config.json sing-box.log

    # - name: Upload Screenshots
    #   if: always() 
    #  uses: actions/upload-artifact@v6
    #  with:
    #    name: screenshots
    #    path: "*.png"
    #    retention-days: 6

    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
        
